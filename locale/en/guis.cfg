; ingame wiki pages

introduction=Introduction
; BEGIN GENERATED: introduction
introduction-text1=Welcome to Sosciencity
introduction-text2=To progress in Sosciencity you'll need to built a city with happy huwans living in there. The huwan society is split into 8 castes, all with their own lifestyle and needs. While you progress throughout the mod, you will integrate them all into your city one after another.
introduction-text3=In Sosciencity you'll need your huwans to help with your research. You might already have noticed that you need [font=default-bold][color=#80CC33] [item=artistic-insight] __ITEM__artistic-insight__[/color][/font] to produce the first science pack. You can [font=default-bold][color=#80CC33] [recipe=brainstorm] __RECIPE__brainstorm__[/color][/font] a bit and come up with your own for now, but to automate them you'll need to unlock the [font=default-bold][color=#80CC33] [technology=ember-caste] __TECHNOLOGY__ember-caste__[/color][/font].
introduction-text4=Your First Settlement
introduction-text5=But before you're able to welcome your first huwans, you need to prepare some infrastructure to meet the basic needs of your people.
introduction-text6=[font=default-bold]Housing:[/font] Everyone needs some kind of home with a roof on top. Homeless inhabitants won't be able to live comfortably and work for you. So built some houses first. In the beginning you are limited to [font=default-bold][color=#80CC33] [entity=living-container] __ENTITY__living-container__[/color][/font]. Those are nothing much, but will work just fine for the first 3 castes. After building a house, click on it and assign it to a caste to allow them to move inside.
introduction-text7=[font=default-bold]Food:[/font] Collect some food via [Gather Food], so your inhabitants have something to eat. You can provide food by either placing it in their homes or in a nearby [font=default-bold][color=#80CC33] [entity=market-hall] __ENTITY__market-hall__[/color][/font].
introduction-text8=[font=default-bold]Water:[/font] Provide water to your people's homes with a [font=default-bold][color=#80CC33] [entity=water-tower] __ENTITY__water-tower__[/color][/font] in range of your houses. The normal water you use to power your steam-engines isn't exactly save to consume. So better drill for some [font=default-bold][color=#80CC33] [fluid=drinkable-water] __FLUID__drinkable-water__[/color][/font] with a [font=default-bold][color=#80CC33] [entity=groundwater-pump] __ENTITY__groundwater-pump__[/color][/font].
introduction-text9=[font=default-bold]Garbage:[/font] Soon your inhabitants will produce some garbage. If you don't provide them a way to get rid of it, trash will accumulate in their homes and make everyone sick. Better build a [font=default-bold][color=#80CC33] [entity=trash-site] __ENTITY__trash-site__[/color][/font] nearby, so they have a place to dispose it. Getting rid of all that trash is a bit tricky at first. So built a [font=default-bold][color=#80CC33] [entity=waste-dump] __ENTITY__waste-dump__[/color][/font] to store it for now. Future you will have this covered.
introduction-text10=Tip: Place your first settlement next to a forest or a body of water. This way you can automate the food supply with a [font=default-bold][color=#80CC33] [entity=hunting-hut] __ENTITY__hunting-hut__[/color][/font] or [font=default-bold][color=#80CC33] [entity=fishing-hut] __ENTITY__fishing-hut__[/color][/font].
introduction-text11=But where do huwans come from?
introduction-text12=Huwans come from eggs, duh. Once you have your basic infrastructure in place, build an [font=default-bold][color=#80CC33] [entity=upbringing-station] __ENTITY__upbringing-station__[/color][/font]. This building will hatch and raise any huwan eggs you put inside.
introduction-text13=Upon graduation the small huwans will join a caste and move into a home with free space. You can influence their upbringing to increase the chance that they join the caste you want - but in the end it's their life and they might join another instead.
introduction-text14=You can get your first eggs at the cost of some food calories via [font=default-bold][color=#80CC33] [recipe=lay-egg] __RECIPE__lay-egg__[/color][/font].
introduction-text15=The reproductive biology of huwans is more complex than that of humans. You, the engineer, are some kind of queen gender that can reproduce asexually. I guess that get's tyring over time. Later on you might find better ways to get Eggs with less of your involvement.\n[color=#CCCCCC](Don't quote me too hard on all that, I'm not a biologist.)[/color]
; END GENERATED: introduction

; BEGIN GENERATED: huwans101
huwans101-text1=Huwans 101
huwans101-text2=Huwans are really fragile and needy at times. You're taking on a lot of responsibility by trying and building a whole city full of them. This article aims to give you an overview of all the things you need to know about how to keep huwans alive and happy.
huwans101-text3=Happiness, Health, Sanity
huwans101-text4=These are your main metrics that give you a clue about how your huwans are feeling. In Alt-Mode you can get a quick glance on their values when you hover your mouse over a home. When you open a house, you can see a breakdown of all the factors at play in the 'Details' Tab.
huwans101-text5=These metrics are inert. Meaning if a influence on them changes, it takes a small while until the actual values reach the new predicted values.
huwans101-text6=Generally: The higher these metrics are, the better. Values over 10 are generally good; values below 10 get increasingly critical.
huwans101-text7=Happiness
huwans101-text8=Happiness is kind of your most important metric as it's tied with the productivity of your inhabitants. The happier your huwans are, the more caste points they provide and the more they get done when working at a building.
huwans101-text9=If the happiness drops below a caste-specific threshold, the inhabitants get fed up and go on strike. Striking huwans refuse to work in factories and stop contributing to their caste bonus. The lower happiness falls, the more severe the strike gets.
huwans101-text10=Health
huwans101-text11=Health directly influences how often your inhabitants get sick from general diseases like the flu.
huwans101-text12=The biggest influence on your inhabitants health is the food and water they're provided.
huwans101-text13=Health also has a influence on happiness. Health values over 10 translate to a happiness bonus; values below 10 translate to a drastic multiplicative malus.
huwans101-text14=Sanity
huwans101-text15=Sanity directly influences how often your inhabitants get sick from mental health issues like burnout.
huwans101-text16=The biggest influence on your inhabitants is the quality of their home and how many people they interact with on a daily basis.
huwans101-text17=Sanity also has a influence on happiness. Sanity values over 10 translate to a happiness bonus; values below 10 translate to a drastic multiplicative malus.
huwans101-text18=Let's take a look on all the things you need to provide to your city.
huwans101-text19=Homes
huwans101-text20=Everyone needs some kind of home with a roof on top. Homeless huwans won't be able to live comfortably and work for you. How well you accommodated your inhabitants
huwans101-text21=The houses you can build differ in 3 attributes:
huwans101-text22=[font=default-bold]Room Count:[/font] Simply how big the building is. This determines how many huwans can live inside. Most early game castes need one room per inhabitant, but the later ones are more demanding.
huwans101-text23=[font=default-bold]Comfort:[/font] Describes how well equipped and furnished the house is. This directly influences the inhabitant's happiness and sanity.
huwans101-text24=[font=default-bold]Traits:[/font] Describes how the house looks and feels from inside. Every caste has their own ideas which traits they like or despise. For example: people from the Clockwork Caste like houses with the 'technical' tag, but are less happy with a 'decorated' home.
huwans101-text25=If you don't have enough housing space for the amount of huwans, the remaining ones will become homeless.
huwans101-text27=Homelessness
huwans101-text28=Once huwans are homeless they evade the statistical surveys of your city. So you can't know exactly how many there are and how they are doing.
huwans101-text29=Homeless huwans won't be able to work for you. Neither in factories nor for the caste bonus.
huwans101-text30=Instead your homeless citizens will try to find a new home. They will move into houses with free spaces if there are new ones. They even might seize houses that are built but not assigned to a specific caste. If that fails, they even try to build their own shacks near Market Halls.
huwans101-text31=Being homeless is a tough fortune. Over time these huwans will leave your city and try to find a better life somewhere else.
huwans101-text32=Food
huwans101-text33=Your inhabitants need something to eat. You can provide them food either by placing it inside their home or in a nearby [font=default-bold][color=#80CC33] [entity=market-hall] __ENTITY__market-hall__[/color][/font]. Every caste has an [font=default-bold]eating behavior[/font] - minimalist, mixed or foodie - that determines which foods they include in their diet and how they prioritize taste versus variety.
huwans101-text34=[font=default-bold]Taste:[/font] Each caste favors one taste and dislikes another. Eating favored food boosts happiness; eating disliked food hurts it. Having any favored food at all gives a small sanity boost. If the diet becomes dominated by disliked foods, sanity suffers too.
huwans101-text35=[font=default-bold]Appeal:[/font] Food has an appeal value independent of taste. The average of the three most appealing foods in the diet is granted as a happiness bonus.
huwans101-text36=[font=default-bold]Nutrition Tags:[/font] Foods can be for example be protein-rich, fat-rich or carb-rich. Covering nutrition tags gives a health bonus; missing tags lead to a health malus.
huwans101-text37=[font=default-bold]Variety:[/font] Each caste expects a minimum number of different foods. Going below that causes a happiness malus per missing food. Exceeding it gives a small bonus per extra food.
huwans101-text38=[font=default-bold]Food Distress:[/font] If no food matching the caste's normal eating behavior is available - but some food exists - your inhabitants fall back to whatever is on hand. All taste effects are suppressed and a harsh happiness penalty applies instead.
huwans101-text39=Better make sure that your food supply is steady and sufficient, as having nothing to eat will make your inhabitants freak out quickly.
huwans101-text41=Water
huwans101-text42=Your inhabitants need drinkable water. You can provide that with a [font=default-bold][color=#80CC33] [entity=water-tower] __ENTITY__water-tower__[/color][/font] placed in range of their house. Better make sure that your water supply is steady and sufficient, as having nothing to drink will make your inhabitants freak out quickly.
huwans101-text43=The normal water you get with a offshore pump is really unsafe to drink. You'll need to get clean groundwater with a [font=default-bold][color=#80CC33] [entity=groundwater-pump] __ENTITY__groundwater-pump__[/color][/font] in the beginning. One such pump can provide water for around 120 huwans. Later on you can unlock more options to get drinkable water.
huwans101-text44=If a house has access to multiple water towers with different kinds of drinking water, the huwans will consume water from the tower with the highest quality water first.
huwans101-text45=[color=#CCCCCC]Unfortunately you cannot mix different water qualities. That's a hard limitation of Factorio's engine. Instead you'll need to place pipings and water towers for every kind of drinking water that you want to supply.[/color]
huwans101-text46=Garbage Collection
huwans101-text47=Your huwans produce [font=default-bold][color=#80CC33] [item=garbage] __ITEM__garbage__[/color][/font] and [font=default-bold][color=#80CC33] [item=food-leftovers] __ITEM__food-leftovers__[/color][/font] over time. Providing a [font=default-bold][color=#80CC33] [entity=trash-site] __ENTITY__trash-site__[/color][/font] nearby will make your inhabitants dispose garbage there. Without garbage collection, the garbage will end up in the homes of your huwans. This will make them unhappy and can even take a toll on their health.
huwans101-text48=Getting rid of garbage isn't easy. In the beginning there aren't many more options than stuffing it into a [font=default-bold][color=#80CC33] [entity=waste-dump] __ENTITY__waste-dump__[/color][/font] and forgetting about it. Over time you will unlock better methods to get rid of the trash.
huwans101-text49=Healthcare
huwans101-text50=Everyone get sick from time to time. If huwans are sick, they won't work for the nearby factories. However, they will still work and provide points for the caste bonus with a diminished productivity. Diseases are very versatile and come from multiple sources:
huwans101-text51=[font=default-bold]General Diseases:[/font] Huwans get these from time to time, depending on their Health.
huwans101-text52=[font=default-bold]Mental Health Issues:[/font] Sometimes people develop mental health problems. Life is not easy. A high Sanity value decreases the frequency of those.
huwans101-text53=[font=default-bold]Workplace Injuries:[/font] Working in a factory takes a toll on your inhabitants. Exhaustion and workplace accidents sometimes knocks them out.
huwans101-text54=[font=default-bold]Birth Defects:[/font] Some inhabitants come to this world with disabilities. These are usually hard to treat and don't cure naturally.
huwans101-text55=[font=default-bold]Escalations:[/font] Some diseases can escalate into a different, more serious illness if not treated by a medical professional.
huwans101-text56=[font=default-bold]Complications:[/font] Not every treatment works every time. Some can have side effects and give your huwans another disease instead.
huwans101-text57=Some of these diseases go away naturally after some time. But others don't. Some are even infectious and can spread in your city if left unchecked. So it is advisable to provide healthcare to your inhabitants to keep everyone save, healthy and productive.
huwans101-text58=You can provide healthcare to your people by building med bays or hospitals. These cure all sick huwans living in range - if possible. By opening a hospital you can get an overview of all the untreated diseases in their range.
huwans101-text59=Curing a disease takes some work by the healthcare workers (displayed as 'operations') and might need some medicine items that you can provide either inside the hospital building or in a pharmacy. Some diseases even require extra hospital facilities, which need to be placed next to the main hospital building.
; END GENERATED: huwans101

work=Work
; BEGIN GENERATED: work
work-text1=Huwan Productivity
work-text2=There are 2 ways in which huwans can be useful for you and your factory: they can either work at a nearby located building that needs workers - or they can work on their own authority and provide a caste bonus that buffs some aspects of you whole city or factory.
work-text3=Factory Work
work-text4=Some buildings need a workforce to function properly, like for example the [font=default-bold][color=#80CC33] [entity=ember-hq] __ENTITY__ember-hq__[/color][/font]. The tooltip of these manufactories tell you how many workers of which castes are required. You need to place these near the homes of potential workers, because huwans don't like to commute long distances. The highlighted range when placing a building with workforce shows you which houses are close enough to work there. Manufactories employ their required amount of huwans automatically. You can limit how many they should employ in their GUI.
work-text5=The performance of manufactories depends on how many workers are working there and how happy they are.
work-text6=Working in a factory has some risks for your huwans. From time to time they get sick from [font=default-bold]Workplace Injuries[/font]. Only healthy huwans are able to work in a factory. If they are sick they'll do the only sane thing which is staying home and focusing on their recovery.
work-text7=Caste Bonus Work
work-text8=Huwans that are not working in a manufactory will still try to be useful for your city. Instead they are working to provide a caste specific bonus for your city. This work gets video game-like quantified as 'caste points'. The more caste points all of your huwans of one caste generate, the bigger the caste bonus. You can see the current caste bonuses on the top left of your screen.
work-text9=Even huwans that are sick provide caste points - although at a reduced rate, depending on disease.
; END GENERATED: work

; BEGIN GENERATED: maintenance
maintenance-text1=Maintenance
maintenance-text2=In Sosciencity you need mechanics that maintain your machines. That's the job of the Clockwork caste. If your city doesn't have enough maintenance work done, your factory will begin to slow down. To support your factory, you need a proportionally sized city.
maintenance-text3=Each active machine needs 1 Clockwork Point to function properly. Active means that it worked during the last 2 minutes.
maintenance-text4=When you don't have enough maintenance work for the size of your factory, your machines can slow down by up to -60%.
maintenance-text5=In the beginning of the game this can be tough. So don't build big until you have a healthy settlement going.
maintenance-text6=On the other hand: Surplus points will even increase the speed of your machines. That's the normal Clockwork bonus.
maintenance-text7=[color=#CCCCCC]There are free 'startup' points, configurable in the Map settings. You might want to adjust these if you're playing Sosciencity together with a complex mod. (Alternatively you can disable this mechanic entirely in the settings - in case you don't like it.)[/color]
; END GENERATED: maintenance

; BEGIN GENERATED: competition
competition-text1=Competition for Resources
competition-text2=In Sosciencity there are some buildings that use natural resources, like the [font=default-bold][color=#80CC33] [entity=groundwater-pump] __ENTITY__groundwater-pump__[/color][/font] which uses ground water, the [font=default-bold][color=#80CC33] [entity=hunting-hut] __ENTITY__hunting-hut__[/color][/font] which needs nearby forests or the [font=default-bold][color=#80CC33] [entity=fishing-hut] __ENTITY__fishing-hut__[/color][/font] which needs nearby water bodies.
competition-text3=There is a phenomenon I like to call 'Competition for Resources'. That means: if there are multiple of these buildings present in an area, they begin to overuse the natural resources present. They hinder each other and lower each others performance. You still get more productivity in total. But the individual building will work slower with each one sharing the area.
competition-text4=Recipe Specialisation
competition-text5=For [font=default-bold][color=#80CC33] [entity=hunting-hut] __ENTITY__hunting-hut__[/color][/font] and [font=default-bold][color=#80CC33] [entity=fishing-hut] __ENTITY__fishing-hut__[/color][/font], the competition penalty is reduced when neighbouring buildings are set to [font=default-bold]different recipes[/font]. A neighbour hunting searching for something else only counts as 30% of a full competitor, since they are exploiting a different part of the ecosystem. Two huts targeting the same prey or the same fish species compete at full strength.
competition-text6=So if you want to pack several of these buildings close together, setting them to different recipes is a good way to reduce how much they slow each other down.
; END GENERATED: competition

; BEGIN GENERATED: composting
composting-text1=Composting
composting-text2=Hey. I'm rosiscef from the Orchid Caste. You can call me Rose.
composting-text3=Tiri said you need some explanation about composting. Yee. You look like an urbanite. That's okay.
composting-text4=Where do I start. You know plants, right? Like trees, or flowers. You see. They grow out of the ground. Because they have roots in there. The roots are not only for stability. They also get water and nutrients. If you want your plants to really thrive and grow big, you need good, nutrient-rich soil. So.. how do you get that?
composting-text5=The answer ist Composting! You take plant parts you don't need, like [font=default-bold][color=#80CC33] [item=leafage] __ITEM__leafage__[/color][/font]. And you just pile them up. There are bacteria in the ground which will eat the stuff and turn it into [font=default-bold][color=#80CC33] [item=humus] __ITEM__humus__[/color][/font] - that's a smart word for 'soil with a lot of nutrients'. It's kind of a cycle. Soil turns into plant, plant turns back into soil.
composting-text6=First, you build a [font=default-bold][color=#80CC33] [entity=composting-silo] __ENTITY__composting-silo__[/color][/font]. Those Clockwork guys engineered that to provide a good environment for your ground bacteria. You throw it aaaalll in there. And on the bottom of your huge plant-pile, the bacteria party starts.
composting-text7=But now the [font=default-bold][color=#80CC33] [item=humus] __ITEM__humus__[/color][/font] is there right at the bottom. A bit inconvenient. For that they designed a [font=default-bold][color=#80CC33] [entity=composting-silo-output] __ENTITY__composting-silo-output__[/color][/font]. You need to place it anywhere near your silo and it will get you the humus with some underground machinery or something like that. I don't know how that works, haha. Just glad it does!
composting-text8=We have a catalogue with all the items that can be composted somewhere in the dayda-tab. It's also mentioned in the tooltips.
composting-text10=Yee. Did I forget something? Some sugar-rich plants create mold inside your silo while they get composted. That's okay. Don't panic. You don't have to clean it up. It won't clog up the silo. And I heard even mold can be useful sometimes.
; END GENERATED: composting

; BEGIN GENERATED: blood-donations
blood-donations-text1=Blood Donations
blood-donations-text2=Sometimes you just need some blood. Maybe to treat some sick huwan, maybe for some biotechnological process, maybe not, I don't judge.
blood-donations-text3=In the beginning you can donate blood by yourself at the cost of some health points. But you are limited by your body's ability to recover. You might only want to donate once - maybe twice, per day (around 7 real world minutes) or else it will hurt much more.
blood-donations-text4=But as a seasoned Factorio player, you surely want to avoid having to do this manually all the time. The key to automation is [font=default-bold][color=#80CC33] [technology=transfusion-medicine] __TECHNOLOGY__transfusion-medicine__[/color][/font]. This allows your huwans to donate blood for you in a nearby hospital or med bay.
blood-donations-text5=Only healthy huwans will donate blood. How often they do this depends on their Health. The blood donation needs [font=default-bold]10 operations[/font] on the side of the hospital.
; END GENERATED: blood-donations

; BEGIN GENERATED: fear
fear-text1=Fear
fear-text2=Your city exists in a world that can turn hostile. When buildings get destroyed - whether by enemy raids, accidents, or other disasters - the news spreads through your population. Huwans are not oblivious to what's happening around them. They get scared. This is represented by the [font=default-bold]Fear[/font] level.
fear-text3=How Fear builds up
fear-text4=Fear is a city-wide value. It doesn't matter which neighbourhood was hit: the whole population hears about it.
fear-text5=Two kinds of events raise fear:
fear-text6=[font=default-bold]A civil building is destroyed:[/font] A moderate shock. The news is unsettling, but no one died.
fear-text7=[font=default-bold]An inhabited house is destroyed:[/font] A larger shock. People died, and your inhabitants know it. The survivors are much more shaken.
fear-text8=Fear doesn't just stack up linearly. Each event pushes fear closer to a cap of [font=default-bold]10[/font], but with diminishing returns - the further fear already is from zero, the smaller the next bump will be. The first raid is terrifying. The tenth feels almost expected.
fear-text9=This means fear can never exceed 10, no matter how many buildings are destroyed in quick succession.
fear-text10=How Fear decays
fear-text11=Fear is not permanent. After [font=default-bold]one nauvis day[/font] without a new incident, it starts to fade on its own. The longer the peace holds, the faster the recovery - but getting from a high fear level back to zero still takes around 15 minutes of uninterrupted calm.
fear-text12=There is no active way to reduce fear faster. The only solution is to stop the destruction.
fear-text13=What Fear does
fear-text14=High fear takes a toll on your inhabitants' [font=default-bold]Sanity[/font]. Each point of fear subtracts from the sanity of every house in your city.
fear-text15=How severely fear affects a caste depends on their [font=default-bold]fear susceptibility[/font]:
fear-text16=[font=default-bold][font=default-bold][color=#80CC33] [virtual-signal=signal-gunfire] Gunfire[/color][/font] and [font=default-bold][color=#80CC33] [virtual-signal=signal-plasma] Plasma[/color][/font]:[/font] Susceptibility of 40%. Soldiers are trained to operate under fire, Medicals have seen people from the inside - fear has a vastly reduced effect on them.
fear-text17=[font=default-bold][font=default-bold][color=#80CC33] [virtual-signal=signal-clockwork] Clockwork[/color][/font]:[/font] Susceptibility of 70%. Those mechanics aren't exactly the sensitive kind.
fear-text18=[font=default-bold]Most castes:[/font] Susceptibility of 100%. Full effect.
fear-text19=Remember low sanity values cause a happiness penalty - so sustained fear doesn't just hurt sanity, leading to more mental health problems. It drags happiness down with it.
; END GENERATED: fear

; BEGIN GENERATED: strike
strike-text1=Strikes
strike-text2=Huwans are not machines. If life in your city gets bad enough, they will stop working for you until things improve. This is called a [font=default-bold]Strike[/font].
strike-text3=When does a Strike happen?
strike-text4=Every caste has two happiness thresholds that determine when they go on strike:
strike-text5=[font=default-bold]Strike begins:[/font] Once happiness drops below this value, some inhabitants start to refuse work. The strike starts small but grows the further happiness falls.
strike-text6=[font=default-bold]Full strike:[/font] Once happiness drops below this value, the strike is at its maximum severity.
strike-text7=You can look up these thresholds for each caste on their respective caste page.
strike-text8=What does a Strike do?
strike-text9=A strike has two effects:
strike-text10=[font=default-bold]1. Workers stop showing up.[/font]
strike-text11=Striking inhabitants will leave their jobs at nearby factories. The more severe the strike, the fewer are willing to work. The factories will try to fill those spots from other, non-striking houses nearby - but if those aren't available, production slows down or stops entirely.
strike-text12=[font=default-bold]2. Caste bonus output drops.[/font]
strike-text13=Even huwans that aren't employed in a factory normally contribute to their caste bonus through their everyday work. Striking inhabitants stop doing that too. For most castes, this drops to zero during a full strike. Some early castes retain a reduced caste bonus output even during a full strike.
strike-text14=Can some workers still show up?
strike-text15=For a few castes, yes. The [font=default-bold][color=#80CC33] [virtual-signal=signal-orchid] Orchid[/color][/font] and [font=default-bold][color=#80CC33] [virtual-signal=signal-clockwork] Clockwork[/color][/font] castes have a small fraction of their members who will keep working regardless of how unhappy they are. This is the [font=default-bold]minimum worker fraction[/font] - visible on their caste pages.
strike-text16=For all other castes this fraction is zero: a full strike means no one comes to work.
strike-text17=How to end a Strike
strike-text18=Get their happiness back up above the 'strike begins' threshold. Strikes resolve automatically once happiness recovers - there is no lasting grudge. The usual suspects for low happiness are:
strike-text19=Food supply problems (too little variety, wrong taste, no food at all)
strike-text20=Water supply problems
strike-text21=Poor housing comfort or mismatched housing traits
strike-text22=Low health or sanity dragging happiness down through their respective multipliers
strike-text23=Check the Details tab of the affected house for a breakdown of what is pulling happiness down.
; END GENERATED: strike

; BEGIN GENERATED: food
food-text1=Food
food-text2=Food keeps your inhabitants alive and in good spirits. What they eat affects their [font=default-bold]happiness[/font], [font=default-bold]health[/font] and [font=default-bold]sanity[/font]. Every caste has an eating behavior that determines which foods they include in their diet.
food-text3=Eating Behaviors
food-text4=Every caste is either a minimalist, a foodie or a mixed eater. This governs which foods end up in their diet.
food-text5=Minimalist
food-text6=Minimalists don't eat for pleasure. They choose foods strictly to cover their nutritional needs, preferring favored-tasting foods first, neutral foods second and disliked foods as a last resort. They stop picking foods once all nutrition tags are covered. Taste perks like appeal still apply, but they won't eat extra foods just for variety.
food-text7=Foodie
food-text8=Foodies value variety over healthiness. They eat every favored and neutral food they can get - but refuse disliked foods outright. If no suitable food is available they go into food distress rather than compromise their standards.
food-text9=Mixed
food-text10=Mixed eaters balance variety with nutritional coverage. They pick all their favored foods, then fill missing nutrition tags from neutral foods, and finally pull in more neutral foods until they hit their minimum variety count.
food-text11=Taste
food-text12=Each caste has one taste they [font=default-bold]favor[/font] and one they [font=default-bold]dislike[/font]. The remaining tastes are neutral filler.
food-text13=Each favored-tasting food in the diet gives a happiness bonus.
food-text14=Each disliked-tasting food gives a happiness malus.
food-text15=Having at least one favored food in the diet gives a flat sanity bonus - a small comfort from eating something you enjoy.
food-text16=If the disliked taste becomes the plurality of the diet, that monotony of bad food deals a sanity malus.
food-text17=Appeal
food-text18=Every food has an [font=default-bold]appeal[/font] value that reflects how pleasant it is to eat, independent of taste. The three highest-appeal foods in the diet each contribute to a flat happiness bonus. Adding more appealing foods is always safe - appeal never has a negative effect, and it stacks up to three foods.
food-text19=Nutrition Tags
food-text20=Foods can carry one or more [font=default-bold]nutrition tags[/font] like [color=#CCCCCC]protein-rich[/color], [color=#CCCCCC]fat-rich[/color] or [color=#CCCCCC]carb-rich[/color]. A well-rounded diet covers all three.
food-text21=Each covered tag type gives a health bonus.
food-text22=Each missing tag type gives a health malus.
food-text23=How important nutritional balance is varies by caste.
food-text24=When building a diet, the eating behavior tries to cover all three tags before adding purely variety-boosting foods. A single food can cover multiple tags if it carries them.
food-text25=Variety
food-text26=Each caste has a [font=default-bold]minimum food count[/font] - the number of different foods they expect in their diet.
food-text27=Going below the minimum causes a happiness malus per missing food.
food-text28=Going above the minimum gives a small happiness bonus per extra food.
food-text29=The malus scales linearly: a shortfall of two foods costs twice as much as a shortfall of one.
food-text30=Food Distress
food-text31=When no food matches the caste's normal eating behavior but some food is available, the inhabitants enter [font=default-bold]food distress[/font]. They fall back to whatever is on hand:
food-text32=[color=#CCCCCC]Minimalists[/color] and [color=#CCCCCC]mixed eaters[/color] pick the most appealing available foods.
food-text33=[color=#CCCCCC]Foodies[/color] are stuck eating their disliked foods.
food-text34=During food distress all taste-based happiness effects are suppressed - there's no point tracking taste when you have no choice. Instead a caste-specific [font=default-bold]distress factor[/font] applies a multiplicative penalty to happiness. Castes later in the progression have stricter distress factors and are less forgiving of a poorly stocked pantry.
food-text35=Food distress is distinct from outright [font=default-bold]starvation[/font] (absolutely no food).
food-text36=Starvation
food-text37=When there is no food at all - not even something to fall back on - inhabitants starve. Starvation skips all diet effects entirely: no appeal bonus, no taste effects, no nutrition tag evaluation. Instead, two flat multipliers kick in:
food-text38=A harsh [font=default-bold]happiness factor[/font] halves nominal happiness.
food-text39=A harsh [font=default-bold]health factor[/font] halves nominal health.
food-text40=The longer it goes on, the more likely inhabitants are to get sick of malnutrition diseases.
; END GENERATED: food

; BEGIN GENERATED: housing
housing-text1=Housing
housing-text2=Every huwan needs a place to sleep. Before inhabitants can move in anywhere, you need to build houses and assign them to a caste. This page gives an overview how houses work, how comfort affects your people's happiness, and how to upgrade and manage houses efficiently.
housing-text3=House Basics
housing-text4=Houses come in many shapes and sizes, from improvised [font=default-bold][color=#80CC33] [entity=living-container] __ENTITY__living-container__[/color][/font]s to spacious mansions. The key properties of a house are:
housing-text5=[font=default-bold]Rooms:[/font] How many rooms the house has. Each caste requires a certain number of rooms per inhabitant (shown in the caste info), so a bigger house isn't always a bigger population - it depends on who moves in.
housing-text6=[font=default-bold]Max. Comfort:[/font] The highest comfort level this house can ever reach. Different house types have different ceilings.
housing-text7=[font=default-bold]Qualities:[/font] Fixed characteristics of the house that certain castes prefer or dislike - things like being spacious, compact, or cheap. These affect the happiness bonus inhabitants get from their home.
housing-text8=You can see all of these in the house's detail view by clicking on it.
housing-text9=Assigning a Caste
housing-text10=An unoccupied house won't attract inhabitants on its own - you need to assign it to a caste first. There are several ways to do this.
housing-text11=Via the Detail View
housing-text12=Click an empty house and go to the [font=default-bold]Caste Chooser[/font] tab. You'll see a button for each caste you've unlocked. The button colour tells you what to expect:
housing-text13=[font=default-bold]Normal:[/font] The house is a good fit for this caste right now.
housing-text14=[font=default-bold]Orange:[/font] The current comfort is below the caste's minimum, but the house [color=#CCCCCC]can[/color] reach it with upgrades. Inhabitants will move in but be unhappy until you upgrade.
housing-text15=[font=default-bold]Red:[/font] Either the house doesn't have enough rooms for even one inhabitant of this caste, or the house's max comfort is too low to ever reach the caste's minimum - even fully upgraded it won't satisfy them.
housing-text16=Clicking a caste button assigns the house and moves inhabitants in immediately if any are available.
housing-text17=You can also reassign an occupied house by using the [font=default-bold]Kickout[/font] button (visible in the occupied house detail view), which removes the current inhabitants and lets you pick a new caste.
housing-text18=Via the Placement Panel
housing-text19=When you're holding a house item in your cursor, a placement panel appears in the City Info (the interface at the top of the screen). Here you can set:
housing-text20=[font=default-bold]Comfort:[/font] The comfort level you want the house to reach after placement. The house will start at comfort 0 and automatically request furniture from your logistics network to work toward this target.
housing-text21=[font=default-bold]Caste:[/font] Which caste to assign the house to on placement. If you have enough furniture in your inventory, it will also be used toward the first upgrade immediately.
housing-text22=Selecting no caste at all skips auto-assignment entirely and places the house unassigned.
housing-text23=These settings are saved per caste - switching the caste dropdown in the panel loads that caste's last-used target comfort.
housing-text24=Via Copy-Paste (Settings Paste)
housing-text25=Copy a house with [font=default-bold]Shift+Right-Click[/font] and paste its settings onto another with [font=default-bold]Shift+Left-Click[/font] (the standard Factorio settings-paste shortcut). This copies the caste assignment and target comfort to the destination house and immediately attempts an upgrade using items from your inventory.
housing-text26=Pasting from an occupied house to an empty one: assigns the same caste and applies the target comfort.
housing-text27=Pasting between two houses of the same state: copies target comfort and attempts upgrade from your inventory - but does not change caste if the destination is already occupied.
housing-text28=Via Blueprints
housing-text29=When you include a house in a blueprint, the blueprint captures the caste assignment, comfort level, target comfort and housing priority. When the blueprint is placed:
housing-text30=The captured caste is auto-assigned when the house is built.
housing-text31=The captured target comfort is applied, and the house will begin requesting furniture from the logistics network.
housing-text32=If a blueprint is placed in an area with existing logistics infrastructure, the upgrade process starts automatically - no manual intervention needed.
housing-text33=Comfort
housing-text34=Comfort is a measure of how nicely furnished a house is. Every house starts empty and barren at a Comfort Level of 0 when placed. Each caste has a [font=default-bold]minimum comfort[/font] they'd prefer to live at. Living below that threshold doesn't prevent them from moving in - they'll take what they can get - but it does make them less happy and thus less productive.
housing-text35=The happiness penalty scales proportionally: a house at half the caste's minimum comfort causes roughly half the normal comfort happiness. Once you reach the minimum, the penalty disappears entirely.
housing-text36=You can check the minimum comfort for each caste in the caste info panel.
housing-text37=Upgrading Comfort
housing-text38=To raise a house's comfort level, you need to furnish it with the right items - beds, bathroom furniture, carpets, curtains, and so on. Each comfort level has its own upgrade cost [font=default-bold]per room[/font], so larger houses cost proportionally more to upgrade. You can look up the exact costs for each level in the recipe browser under the "Housing Upgrades" category.
housing-text39=Higher comfort levels are gated behind [font=default-bold]architecture technologies[/font]. You won't be able to upgrade past a certain level until you've researched the required tech.
housing-text40=When you deconstruct a house, all items that went into furnishing are refunded to you.
housing-text41=Manual Upgrade
housing-text42=Open the house's detail view and switch to the [font=default-bold]House Info[/font] tab. If the next comfort level is unlocked, you'll see an upgrade button showing the cost. Clicking it consumes the required items - first from the house's own chest inventory, then from your personal inventory - and immediately raises the comfort by one level.
housing-text43=Automated Upgrade via Logistics
housing-text44=In the same tab, you can set a [font=default-bold]target comfort[/font] using a stepper control. Once a target is set, the house will automatically request the furniture it needs from the logistics network. If possible, Construction Robots will deliver them. When the items arrive in the house's chest, the upgrade happens on its own. You can queue up multiple levels at once - the house will keep requesting and upgrading until it reaches the target.
housing-text45=Housing Priority
housing-text46=In the occupied house detail view there's a [font=default-bold]Priority[/font] field. This controls which houses inhabitants prefer when choosing where to live. Higher priority houses fill up first. You can use the preset buttons (low, mid, high, very high) or type in a custom value.
housing-text47=Priority is also saved in blueprints and copied by settings-paste.
; END GENERATED: housing

